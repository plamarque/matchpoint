# Référence pour déploiement Cloud Run (optionnel).
# Déploiement recommandé : gcloud run deploy --source . (depuis backend/)
# WebSocket : pas de config spécifique ; garder request-timeout élevé (ex. 3600 s)
# et ne pas activer HTTP/2 end-to-end sur le service.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: matchpoint-remote
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/request-timeout: "3600"
    spec:
      containerConcurrency: 80
      containers:
        - image: gcr.io/PROJECT_ID/matchpoint-remote
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          resources:
            limits:
              memory: "256Mi"
              cpu: "1"
